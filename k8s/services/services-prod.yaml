apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: prod
  labels:
    app: product-service
    environment: prod
    service-type: clusterip
spec:
  type: ClusterIP
  selector:
    app: product-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: product-service-nodeport
  namespace: prod
  labels:
    app: product-service
    environment: prod
    service-type: nodeport
spec:
  type: NodePort
  selector:
    app: product-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 30201
      protocol: TCP
---
