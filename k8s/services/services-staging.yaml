apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: staging
  labels:
    app: product-service
    environment: staging
    service-type: clusterip
spec:
  type: ClusterIP
  selector:
    app: product-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: product-service-nodeport
  namespace: staging
  labels:
    app: product-service
    environment: staging
    service-type: nodeport
spec:
  type: NodePort
  selector:
    app: product-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 30101
      protocol: TCP
---
